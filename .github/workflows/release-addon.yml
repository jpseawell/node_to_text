name: Release Blender Add-on

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-addon-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build Blender add-on zip
        run: |
          rm -rf dist
          mkdir -p dist
          zip -qr dist/node_to_text.zip node_to_text

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: node_to_text
          path: dist/node_to_text.zip

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/node_to_text.zip --clobber
